<style>
  body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 0; background: #f7f7f4; color: #202124; }
  .app { max-width: 1180px; margin: 0 auto; padding: 24px; }
  .toolbar { display: flex; align-items: center; gap: 12px; justify-content: space-between; }
  .actions { display: flex; gap: 8px; }
  h1, h2 { margin: 0 0 12px; }
  h1 { font-size: 30px; }
  h2 { font-size: 22px; }
  .hint { margin: -4px 0 12px; color: #5f6368; font-size: 13px; line-height: 1.5; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
  section { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
  button { border: 0; border-radius: 6px; background: #1a73e8; color: #fff; padding: 9px 12px; cursor: pointer; }
  button:hover { background: #1765cc; }
  button.secondary { background: #5f6368; margin-left: 6px; }
  button.secondary:hover { background: #4d5156; }
  form { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
  label { display: grid; gap: 4px; font-size: 13px; }
  input, select, textarea { min-height: 34px; border: 1px solid #c7c7c7; border-radius: 6px; padding: 6px 8px; }
  textarea { width: 100%; box-sizing: border-box; resize: vertical; font-family: Consolas, "Microsoft JhengHei", monospace; }
  h3 { margin: 16px 0 10px; font-size: 18px; }
  .import-actions { margin-top: 10px; }
  .table { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border-bottom: 1px solid #e6e6e6; padding: 8px; text-align: left; vertical-align: top; }
  th { color: #3c4043; font-weight: 700; }
  td input, td select { min-width: 110px; }
  .over_budget { background: #ffe5e5; font-weight: 700; }
  .warning { background: #fff2cc; }
  .reminder { background: #e8f0fe; }
  pre { white-space: pre-wrap; background: #f1f3f4; padding: 12px; border-radius: 6px; }
  @media (max-width: 820px) {
    .app { padding: 14px; }
    .toolbar { align-items: flex-start; flex-direction: column; }
    .grid, form { grid-template-columns: 1fr; }
  }
</style>
