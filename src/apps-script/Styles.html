<style>
  body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 0; background: #f4f6f7; color: #202124; }
  .app { max-width: 1280px; margin: 0 auto; padding: 24px; }
  .app-header { display: flex; align-items: center; gap: 16px; justify-content: space-between; background: #fff; border: 1px solid #d8dde3; border-radius: 8px; padding: 18px 20px; }
  .page-subtitle { color: #5f6368; font-size: 14px; line-height: 1.5; margin: 4px 0 0; }
  .actions, .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .header-actions { justify-content: flex-end; }
  h1, h2 { margin: 0 0 12px; }
  h1 { font-size: 30px; }
  h2 { font-size: 22px; }
  .hint { margin: -4px 0 12px; color: #5f6368; font-size: 13px; line-height: 1.5; }
  .priority-grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(280px, .8fr); gap: 16px; margin: 18px 0; align-items: start; }
  .workflow-grid, .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 18px 0; }
  section { background: #fff; border: 1px solid #d8dde3; border-radius: 8px; padding: 16px; box-shadow: 0 1px 2px rgba(60, 64, 67, .06); }
  .dashboard-panel { min-width: 0; }
  .workbench { margin-top: 18px; }
  .section-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  .section-header h2, .section-header h3 { margin-bottom: 0; }
  .subheader { margin-top: 18px; }
  .section-tag { display: inline-flex; align-items: center; min-height: 24px; border-radius: 999px; background: #eef2f6; color: #334155; font-size: 12px; font-weight: 700; padding: 2px 10px; white-space: nowrap; }
  button { border: 0; border-radius: 6px; background: #1a73e8; color: #fff; padding: 9px 12px; cursor: pointer; }
  button:hover { background: #1765cc; }
  button.secondary { background: #5f6368; margin-left: 6px; }
  button.secondary:hover { background: #4d5156; }
  button.danger { background: #b3261e; }
  button.danger:hover { background: #8c1d18; }
  form { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
  .compact-form { grid-template-columns: minmax(180px, 1fr) minmax(160px, .6fr) auto; align-items: end; }
  .inline-editor { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: end; padding: 8px; background: #f8fafd; border: 1px solid #dce6f7; border-radius: 6px; }
  label { display: grid; gap: 4px; font-size: 13px; }
  input, select, textarea { min-height: 34px; border: 1px solid #c7c7c7; border-radius: 6px; padding: 6px 8px; }
  textarea { width: 100%; box-sizing: border-box; resize: vertical; font-family: Consolas, "Microsoft JhengHei", monospace; }
  h3 { margin: 16px 0 10px; font-size: 18px; }
  .schedule-panel, .manual-import-panel { border-top: 1px solid #e5e7eb; margin-top: 18px; padding-top: 4px; }
  .import-actions { margin-top: 10px; }
  .batch-toolbar { padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; }
  .list-meta { display: flex; justify-content: space-between; gap: 10px; color: #5f6368; font-size: 13px; margin: 0 0 8px; flex-wrap: wrap; }
  .table { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border-bottom: 1px solid #e6e6e6; padding: 8px; text-align: left; vertical-align: top; }
  th { color: #3c4043; font-weight: 700; background: #fafbfc; }
  td input, td select { min-width: 110px; }
  .over_budget { background: #ffe5e5; font-weight: 700; }
  .warning { background: #fff2cc; }
  .reminder { background: #e8f0fe; }
  .reconcile-row td { background: #fbfcff; }
  .status-pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; background: #eef2f6; color: #334155; white-space: nowrap; }
  .status-pill.normal, .status-pill.received, .status-pill.paid { background: #e6f4ea; color: #137333; }
  .status-pill.reminder, .status-pill.estimated, .status-pill.reconciled { background: #e8f0fe; color: #174ea6; }
  .status-pill.warning, .status-pill.corrected { background: #fff2cc; color: #8a5a00; }
  .status-pill.over_budget, .status-pill.offset, .status-pill.cancelled { background: #fce8e6; color: #b3261e; }
  pre { white-space: pre-wrap; background: #f1f3f4; padding: 12px; border-radius: 6px; }
  @media (max-width: 820px) {
    .app { padding: 14px; }
    .app-header { align-items: flex-start; flex-direction: column; }
    .priority-grid, .workflow-grid, .grid, form, .compact-form, .inline-editor { grid-template-columns: 1fr; }
  }
</style>
