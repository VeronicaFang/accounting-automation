<script>
  let dashboardData = null;

  function setup() {
    setDebug("Setting up sheets...");
    google.script.run
      .withSuccessHandler(() => refresh())
      .withFailureHandler((error) => setDebug(`Setup failed: ${error.message}`))
      .setupDatabase();
  }

  function refresh() {
    setDebug("Loading dashboard data...");
    google.script.run
      .withSuccessHandler((payload) => {
        let data = null;
        try {
          data = typeof payload === "string" ? JSON.parse(payload) : payload;
        } catch (error) {
          setDebug(`Dashboard parse failed: ${error.message}`);
          return;
        }

        if (!data) {
          setDebug("Dashboard returned no data. Re-deploy the latest Apps Script version and try Refresh again.");
          return;
        }

        dashboardData = data;
        const budgetSummary = data.budgetSummary || [];
        const cashFlowOverview = data.cashFlowOverview || [];
        const budgetItems = data.budgetItems || [];
        renderBudget(budgetSummary);
        renderCashFlow(cashFlowOverview);
        renderBudgetOptions(budgetItems);
        toggleCard();
        setDebug(`Loaded ${budgetItems.length} budget item(s), ${budgetSummary.length} budget row(s), ${cashFlowOverview.length} cash-flow month(s).`);
      })
      .withFailureHandler((error) => {
        setDebug(`Dashboard load failed: ${error.message}`);
      })
      .getDashboardDataJson();
  }

  function renderBudget(rows) {
    const html = [
      "<table><thead><tr><th>Item</th><th>Budget</th><th>Used</th><th>Remaining</th><th>Status</th></tr></thead><tbody>",
      ...rows.map((row) => `<tr class="${row.status}"><td>${row.budget_item}</td><td>${row.annual_budget}</td><td>${row.used}</td><td>${row.remaining}</td><td>${row.status}</td></tr>`),
      rows.length === 0 ? '<tr><td colspan="5">No budget items loaded.</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("budgetSummary").innerHTML = html;
  }

  function renderCashFlow(rows) {
    const html = [
      "<table><thead><tr><th>Month</th><th>Income</th><th>Payments</th><th>Net</th></tr></thead><tbody>",
      ...rows.map((row) => `<tr><td>${formatMonth(row.month)}</td><td>${row.income_total}</td><td>${row.payment_total}</td><td>${row.net_cash_flow}</td></tr>`),
      rows.length === 0 ? '<tr><td colspan="4">No cash-flow rows loaded.</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("cashFlowOverview").innerHTML = html;
  }

  function renderBudgetOptions(items) {
    const select = document.getElementById("budgetItemSelect");
    if (items.length === 0) {
      select.innerHTML = '<option value="">No budget items loaded</option>';
      return;
    }
    select.innerHTML = items.map((item) => `<option value="${item.budget_item}">${item.budget_item}</option>`).join("");
  }

  function toggleCard() {
    const isCard = document.getElementById("paymentToolType").value === "credit_card";
    document.getElementById("cardField").style.display = isCard ? "grid" : "none";
  }

  function submitExpense(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const input = Object.fromEntries(formData.entries());
    google.script.run.withSuccessHandler((result) => {
      document.getElementById("expenseResult").textContent = JSON.stringify(result, null, 2);
      event.target.reset();
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("expenseResult").textContent = error.message;
    }).createManualExpense(input);
  }

  function formatMonth(value) {
    if (typeof value === "string" && /^\d{4}-\d{2}/.test(value)) return value.slice(0, 7);
    return value || "";
  }

  function setDebug(message) {
    const debug = document.getElementById("dashboardDebug");
    if (debug) debug.textContent = message;
  }

  refresh();
</script>
