<script>
  let dashboardData = null;
  const PENDING_INVOICE_PAGE_SIZE = 50;

  function setup() {
    setDebug("正在建立 Google Sheet 表格...");
    google.script.run
      .withSuccessHandler(() => refresh())
      .withFailureHandler((error) => setDebug(`建立表格失敗：${error.message}`))
      .setupDatabase();
  }

  function refresh() {
    setDebug("正在載入儀表板資料...");
    google.script.run
      .withSuccessHandler((payload) => {
        let data = null;
        try {
          data = typeof payload === "string" ? JSON.parse(payload) : payload;
        } catch (error) {
          setDebug(`儀表板資料解析失敗：${error.message}`);
          return;
        }

        if (!data) {
          setDebug("沒有讀到儀表板資料。請重新部署最新 Apps Script 版本後，再按重新整理。");
          return;
        }

        dashboardData = data;
        const budgetSummary = data.budgetSummary || [];
        const cashFlowOverview = data.cashFlowOverview || [];
        const incomeSchedule = data.incomeSchedule || [];
        const budgetItems = data.budgetItems || [];
        const paymentSchedule = data.paymentSchedule || data.upcomingCreditCardPayments || [];
        const monthlyBillEstimates = data.monthlyCreditCardBillEstimates || [];
        const recentExpenses = data.recentExpenses || [];
        const pendingInvoiceDraftPage = data.pendingInvoiceDraftPage || {
          rows: data.pendingInvoiceDrafts || [],
          total_count: (data.pendingInvoiceDrafts || []).length,
          offset: 0,
          limit: PENDING_INVOICE_PAGE_SIZE,
          next_offset: null,
          has_more: false,
        };
        data.pendingInvoiceDrafts = pendingInvoiceDraftPage.rows || [];
        data.pendingInvoiceDraftPage = pendingInvoiceDraftPage;
        renderBudget(budgetSummary);
        renderCashFlow(cashFlowOverview);
        renderIncomeSchedule(incomeSchedule);
        renderMonthlyBillEstimates(monthlyBillEstimates, paymentSchedule);
        renderRecentExpenses(recentExpenses);
        renderPendingInvoiceDrafts(data.pendingInvoiceDrafts, budgetItems, pendingInvoiceDraftPage);
        renderBudgetOptions(budgetItems);
        toggleCard();
        setDebug(`已載入 ${budgetItems.length} 個預算項目、${budgetSummary.length} 筆預算狀態、${cashFlowOverview.length} 個現金流月份。`);
      })
      .withFailureHandler((error) => {
        setDebug(`儀表板載入失敗：${error.message}`);
      })
      .getDashboardDataJson();
  }

  function renderBudget(rows) {
    const html = [
      "<table><thead><tr><th>預算項目</th><th>年度預算</th><th>已使用</th><th>剩餘</th><th>狀態</th></tr></thead><tbody>",
      ...rows.map((row) => `<tr class="${row.status}"><td>${escapeHtml(row.budget_item)}</td><td>${formatMoney(row.annual_budget)}</td><td>${formatMoney(row.used)}</td><td>${formatMoney(row.remaining)}</td><td>${statusBadge(row.status)}</td></tr>`),
      rows.length === 0 ? '<tr><td colspan="5">尚未載入預算項目。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("budgetSummary").innerHTML = html;
  }

  function renderCashFlow(rows) {
    const html = [
      "<table><thead><tr><th>月份</th><th>收入</th><th>現金支出</th><th>信用卡付款</th><th>月淨流量</th></tr></thead><tbody>",
      ...rows.map((row) => `<tr><td>${formatMonth(row.month)}</td><td>${formatMoney(row.income_total)}</td><td>${formatMoney(row.cash_expense_total)}</td><td>${formatMoney(row.credit_card_payment_total)}</td><td>${formatMoney(row.net_cash_flow)}</td></tr>`),
      rows.length === 0 ? '<tr><td colspan="5">尚未載入現金流資料。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("cashFlowOverview").innerHTML = html;
  }

  function renderIncomeSchedule(rows) {
    const html = [
      "<table><thead><tr><th>收入月</th><th>收入日</th><th>項目</th><th>金額</th><th>狀態</th><th>來源</th><th>備註</th><th>操作</th></tr></thead><tbody>",
      ...rows.map((row, index) => `<tr><td>${formatMonth(row.income_month || row.income_date)}</td><td>${formatDate(row.income_date)}</td><td>${escapeHtml(row.income_item)}</td><td>${formatMoney(row.income_amount)}</td><td>${incomeStatusBadge(row.income_status)}</td><td>${escapeHtml(row.source || "")}</td><td>${escapeHtml(row.notes || "")}</td><td><button type="button" class="secondary" onclick="toggleIncomeReconcile(${index})">入帳/修正</button></td></tr><tr id="incomeReconcile${index}" class="reconcile-row" style="display:none;"><td colspan="8"><div class="inline-editor"><label>實際金額 <input id="incomeAmount${index}" type="number" min="1" value="${Number(row.income_amount || 0)}"></label><label>收入狀態 <select id="incomeStatus${index}">${incomeStatusOptions(row.income_status)}</select></label><label>備註 <input id="incomeNotes${index}" value="${escapeHtml(row.notes || "")}" placeholder="例如：原預估 65000，實際 64820"></label><button type="button" onclick="updateIncomeStatusFromRow(${index})">更新收入</button></div></td></tr>`),
      rows.length === 0 ? '<tr><td colspan="8">尚未建立收入排程。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("incomeSchedule").innerHTML = html;
  }

  function toggleIncomeReconcile(index) {
    const row = document.getElementById(`incomeReconcile${index}`);
    if (!row) return;
    row.style.display = row.style.display === "none" ? "" : "none";
  }

  function updateIncomeStatusFromRow(index) {
    const row = (dashboardData.incomeSchedule || [])[index];
    if (!row) return;
    const input = {
      income_id: row.income_id,
      income_amount: document.getElementById(`incomeAmount${index}`).value,
      income_status: document.getElementById(`incomeStatus${index}`).value,
      notes: document.getElementById(`incomeNotes${index}`).value,
    };
    document.getElementById("incomeResult").textContent = "正在更新收入...";
    google.script.run.withSuccessHandler(() => {
      document.getElementById("incomeResult").textContent = "已更新收入狀態。";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("incomeResult").textContent = `更新失敗：${error.message}`;
    }).updateIncomeStatus(input);
  }

  function incomeStatusOptions(selected) {
    const statuses = (dashboardData && dashboardData.enums && dashboardData.enums.incomeStatuses) || ["estimated", "received", "corrected"];
    return statuses.map((status) => `<option value="${status}" ${status === selected ? "selected" : ""}>${translateIncomeStatus(status)}</option>`).join("");
  }

  function renderMonthlyBillEstimates(rows, paymentRows) {
    const html = [
      "<table><thead><tr><th>帳單月份</th><th>信用卡</th><th>帳單區間</th><th>預估付款日</th><th>預估帳單金額</th><th>狀態摘要</th><th>明細</th></tr></thead><tbody>",
      ...rows.map((row, index) => `${renderBillEstimateRow(row, index)}${renderBillDetailRow(row, index, paymentRows)}`),
      rows.length === 0 ? '<tr><td colspan="7">未來 6 個月尚未有信用卡帳單預估。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("monthlyBillEstimates").innerHTML = html;
  }

  function renderBillEstimateRow(row, index) {
    return `<tr><td>${formatMonth(row.bill_month)}</td><td>${escapeHtml(row.credit_card_label || translateCreditCard(row.credit_card_name))}</td><td>${formatDate(row.billing_period_start)} - ${formatDate(row.billing_period_end)}</td><td>${formatDate(row.estimated_payment_date)}</td><td>${formatMoney(row.estimated_bill_amount)}</td><td>${formatStatusCounts(row.status_counts)}</td><td><button type="button" class="secondary" onclick="toggleBillDetails(${index})">查看明細 / 對帳</button></td></tr>`;
  }

  function renderBillDetailRow(row, index, paymentRows) {
    const details = (paymentRows || []).map((payment, paymentIndex) => ({ ...payment, paymentIndex }))
      .filter((payment) => formatMonth(payment.payment_month || payment.month) === formatMonth(row.bill_month))
      .filter((payment) => payment.credit_card_name === row.credit_card_name);
    const detailHtml = [
      "<table><thead><tr><th>付款日</th><th>金額</th><th>狀態</th><th>來源消費</th><th>操作</th></tr></thead><tbody>",
      ...details.map((payment) => `<tr><td>${formatDate(payment.payment_date)}</td><td>${formatMoney(payment.payment_amount || payment.amount)}</td><td>${statusBadge(payment.payment_status)}</td><td>${escapeHtml(payment.source_expense || "")}</td><td><button type="button" class="secondary" onclick="togglePaymentReconcile(${payment.paymentIndex})">對帳/修正</button></td></tr><tr id="paymentReconcile${payment.paymentIndex}" class="reconcile-row" style="display:none;"><td colspan="5"><div class="inline-editor"><label>對帳金額 <input id="paymentAmount${payment.paymentIndex}" type="number" min="0" value="${Number(payment.payment_amount || payment.amount || 0)}"></label><label>付款狀態 <select id="paymentStatus${payment.paymentIndex}">${paymentStatusOptions(payment.payment_status)}</select></label><label>對帳備註 <input id="paymentNotes${payment.paymentIndex}" placeholder="對帳備註" value="${escapeHtml(payment.notes || "")}"></label><button type="button" onclick="updatePaymentStatusFromRow(${payment.paymentIndex})">更新付款排程</button></div></td></tr>`),
      details.length === 0 ? '<tr><td colspan="5">此帳單目前沒有付款明細。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    return `<tr id="billDetails${index}" class="reconcile-row" style="display:none;"><td colspan="7">${detailHtml}</td></tr>`;
  }

  function toggleBillDetails(index) {
    const row = document.getElementById(`billDetails${index}`);
    if (!row) return;
    row.style.display = row.style.display === "none" ? "table-row" : "none";
  }

  function togglePaymentReconcile(index) {
    const row = document.getElementById(`paymentReconcile${index}`);
    if (!row) return;
    row.style.display = row.style.display === "none" ? "table-row" : "none";
  }

  function paymentStatusOptions(selected) {
    const statuses = (dashboardData && dashboardData.enums && dashboardData.enums.paymentStatuses) || ["estimated", "reconciled", "paid", "corrected", "offset"];
    return statuses.map((status) => `<option value="${status}" ${status === selected ? "selected" : ""}>${translateStatus(status)}</option>`).join("");
  }

  function updatePaymentStatusFromRow(index) {
    const row = (dashboardData.paymentSchedule || [])[index];
    if (!row) return;
    const input = {
      payment_id: row.payment_id,
      payment_amount: document.getElementById(`paymentAmount${index}`).value,
      payment_status: document.getElementById(`paymentStatus${index}`).value,
      notes: document.getElementById(`paymentNotes${index}`).value,
    };
    document.getElementById("paymentStatusResult").textContent = "正在更新付款狀態...";
    google.script.run.withSuccessHandler(() => {
      document.getElementById("paymentStatusResult").textContent = "付款狀態已更新。";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("paymentStatusResult").textContent = `更新失敗：${error.message}`;
    }).updatePaymentStatus(input);
  }

  function renderRecentExpenses(rows) {
    const html = [
      "<table><thead><tr><th>消費日</th><th>通路</th><th>品項</th><th>預算項目</th><th>金額</th><th>支付方式</th></tr></thead><tbody>",
      ...rows.map((row) => `<tr><td>${formatDate(row.consumption_date)}</td><td>${escapeHtml(row.merchant_name)}</td><td>${escapeHtml(row.item_description)}</td><td>${escapeHtml(row.budget_item)}</td><td>${formatMoney(row.amount)}</td><td>${translatePaymentLabel(row.payment_label)}</td></tr>`),
      rows.length === 0 ? '<tr><td colspan="6">尚未有消費紀錄。</td></tr>' : "",
      "</tbody></table>",
    ].join("");
    document.getElementById("recentExpenses").innerHTML = html;
  }


  function renderPendingInvoiceDrafts(rows, budgetItems, page) {
    const budgetOptions = (selected) => {
      const selectedValue = selected || "";
      const hasSelected = budgetItems.some((item) => item.budget_item === selectedValue);
      const fallbackOption = selectedValue && !hasSelected ? `<option value="${escapeHtml(selectedValue)}" selected>${escapeHtml(selectedValue)}（草稿值）</option>` : "";
      return fallbackOption + budgetItems.map((item) => `<option value="${escapeHtml(item.budget_item)}" ${item.budget_item === selectedValue ? "selected" : ""}>${escapeHtml(item.budget_item)}</option>`).join("");
    };
    const cardOptions = (selected) => ["", "玉山", "聯邦", "國泰", "富邦", "中信"].map((name) => `<option value="${name}" ${name === selected ? "selected" : ""}>${name || "不適用"}</option>`).join("");
    const paymentOptions = (selected) => [
      { value: "cash", label: "現金" },
      { value: "credit_card", label: "信用卡" },
    ].map((option) => `<option value="${option.value}" ${option.value === selected ? "selected" : ""}>${option.label}</option>`).join("");
    const html = [
      `<div class="list-meta"><span>目前顯示 ${rows.length} / 待確認共 ${Number((page && page.total_count) || rows.length)} 筆。</span><span id="invoiceSelectionMeta">已選取 ${rows.length} 筆</span></div>`,
      "<table><thead><tr><th>選取</th><th>消費日</th><th>店家</th><th>品項</th><th>金額</th><th>預算項目</th><th>支付方式</th><th>信用卡</th><th>操作</th></tr></thead><tbody>",
      ...rows.map((row, index) => `<tr><td><input type="checkbox" id="invoiceSelect${index}" checked onchange="updateInvoiceSelectionSummary()"></td><td>${formatDate(row.consumption_date)}</td><td>${escapeHtml(row.merchant_name)}</td><td>${escapeHtml(row.item_description)}</td><td>${formatMoney(row.amount)}</td><td><select id="invoiceBudget${index}">${budgetOptions(row.suggested_budget_item || row.budget_item)}</select></td><td><select id="invoicePayment${index}">${paymentOptions(row.suggested_payment_tool_type || row.payment_tool_type || "cash")}</select></td><td><select id="invoiceCard${index}">${cardOptions(row.suggested_credit_card_name || row.credit_card_name || "")}</select></td><td><button type="button" class="secondary" onclick="deleteInvoiceDraft(${index})">刪除</button></td></tr>`),
      rows.length === 0 ? '<tr><td colspan="9">目前沒有待確認發票。</td></tr>' : "",
      "</tbody></table>",
      page && page.has_more ? '<div class="actions import-actions"><button type="button" class="secondary" onclick="loadMoreInvoiceDrafts()">載入更多 50 筆</button></div>' : "",
    ].join("");
    document.getElementById("pendingInvoiceDrafts").innerHTML = html;
    updateInvoiceSelectionSummary();
  }

  function loadMoreInvoiceDrafts() {
    if (!dashboardData || !dashboardData.pendingInvoiceDraftPage || !dashboardData.pendingInvoiceDraftPage.has_more) return;
    const page = dashboardData.pendingInvoiceDraftPage;
    document.getElementById("invoiceImportResult").textContent = "正在載入更多待確認發票...";
    google.script.run.withSuccessHandler((nextPage) => {
      const rows = nextPage.rows || [];
      dashboardData.pendingInvoiceDrafts = (dashboardData.pendingInvoiceDrafts || []).concat(rows);
      dashboardData.pendingInvoiceDraftPage = {
        rows: dashboardData.pendingInvoiceDrafts,
        total_count: nextPage.total_count || dashboardData.pendingInvoiceDrafts.length,
        offset: 0,
        limit: dashboardData.pendingInvoiceDrafts.length,
        next_offset: nextPage.next_offset,
        has_more: nextPage.has_more === true,
      };
      renderPendingInvoiceDrafts(dashboardData.pendingInvoiceDrafts, dashboardData.budgetItems || [], dashboardData.pendingInvoiceDraftPage);
      document.getElementById("invoiceImportResult").textContent = `已載入 ${dashboardData.pendingInvoiceDrafts.length} / ${dashboardData.pendingInvoiceDraftPage.total_count} 筆待確認發票。`;
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `載入更多失敗：${error.message}`;
    }).getPendingInvoiceDraftPage(page.next_offset, PENDING_INVOICE_PAGE_SIZE);
  }


  function loadInvoiceCsvFile(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || "").replace(/^\uFEFF/, "");
      document.getElementById("invoiceImportText").value = text;
      document.getElementById("invoiceImportResult").textContent = `已讀取檔案：${file.name}。請按「匯入待確認清單」。`;
    };
    reader.onerror = () => {
      document.getElementById("invoiceImportResult").textContent = "讀取 CSV 檔失敗，請改用複製貼上。";
    };
    reader.readAsText(file, "UTF-8");
  }
  function loadManualExpenseCsvFile(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || "").replace(/^\uFEFF/, "");
      document.getElementById("manualExpenseImportText").value = text;
      document.getElementById("expenseResult").textContent = `已讀取檔案「${file.name}」，確認內容後可批次匯入。`;
    };
    reader.onerror = () => {
      document.getElementById("expenseResult").textContent = "讀取檔案失敗，請改用貼上來源值。";
    };
    reader.readAsText(file, "UTF-8");
  }

  function importManualExpenses(saveToRules) {
    const text = document.getElementById("manualExpenseImportText").value;
    if (!text.trim()) {
      document.getElementById("expenseResult").textContent = "請先選擇 CSV 檔，或貼上手動消費清單。";
      return;
    }
    document.getElementById("expenseResult").textContent = "正在批次匯入手動消費...";
    google.script.run.withSuccessHandler((result) => {
      const errors = result.errors || [];
      document.getElementById("expenseResult").textContent = errors.length === 0
        ? `已批次匯入 ${result.imported_count || 0} 筆手動消費。`
        : `已批次匯入 ${result.imported_count || 0} 筆，失敗 ${errors.length} 筆：${errors.map((error) => `第 ${error.row_number} 列 ${error.item || ""} ${error.message}`).join("；")}`;
      if (errors.length === 0) document.getElementById("manualExpenseImportText").value = "";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("expenseResult").textContent = `批次匯入失敗：${error.message}`;
    }).importManualExpensesFromText(text, { save_to_merchant_payment_rules: saveToRules === true ? "yes" : "no" });
  }
  function importInvoices() {
    const text = document.getElementById("invoiceImportText").value;
    if (!text.trim()) {
      document.getElementById("invoiceImportResult").textContent = "請先貼上發票明細。";
      return;
    }
    document.getElementById("invoiceImportResult").textContent = "正在匯入待確認清單...";
    google.script.run.withSuccessHandler((result) => {
      document.getElementById("invoiceImportResult").textContent = `已匯入 ${result.imported_count || 0} 筆到待確認清單，略過重複 ${result.skipped_count || 0} 筆。`;
      document.getElementById("invoiceImportText").value = "";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `匯入失敗：${error.message}`;
    }).importInvoiceDraftsFromText(text);
  }


  function selectAllInvoiceDrafts(checked) {
    (dashboardData.pendingInvoiceDrafts || []).forEach((_, index) => {
      const checkbox = document.getElementById(`invoiceSelect${index}`);
      if (checkbox) checkbox.checked = checked;
    });
    updateInvoiceSelectionSummary();
  }

  function updateInvoiceSelectionSummary() {
    const target = document.getElementById("invoiceSelectionMeta");
    if (!target) return;
    const rows = (dashboardData && dashboardData.pendingInvoiceDrafts) || [];
    const selected = rows.reduce((count, _, index) => {
      const checkbox = document.getElementById(`invoiceSelect${index}`);
      return count + (checkbox && checkbox.checked ? 1 : 0);
    }, 0);
    target.textContent = `已選取 ${selected} 筆`;
  }

  function buildInvoiceConfirmationInput(index, saveToRules) {
    const row = (dashboardData.pendingInvoiceDrafts || [])[index];
    if (!row) return null;
    const paymentToolType = document.getElementById(`invoicePayment${index}`).value;
    return {
      import_id: row.import_id,
      budget_item: document.getElementById(`invoiceBudget${index}`).value,
      payment_tool_type: paymentToolType,
      credit_card_name: paymentToolType === "credit_card" ? document.getElementById(`invoiceCard${index}`).value : "",
      save_to_merchant_payment_rules: saveToRules === true,
    };
  }

  function buildInvoiceDeletionInput(index) {
    const row = (dashboardData.pendingInvoiceDrafts || [])[index];
    return row ? { import_id: row.import_id } : null;
  }

  function deleteSelectedInvoiceDrafts() {
    const inputs = (dashboardData.pendingInvoiceDrafts || []).map((_, index) => {
      const checkbox = document.getElementById(`invoiceSelect${index}`);
      return checkbox && checkbox.checked ? buildInvoiceDeletionInput(index) : null;
    }).filter(Boolean);
    if (inputs.length === 0) {
      document.getElementById("invoiceImportResult").textContent = "請先勾選要刪除的待確認發票。";
      return;
    }
    document.getElementById("invoiceImportResult").textContent = `正在刪除 ${inputs.length} 筆待確認發票...`;
    google.script.run.withSuccessHandler((result) => {
      const errors = result.errors || [];
      document.getElementById("invoiceImportResult").textContent = errors.length === 0
        ? `已刪除 ${result.deleted_count || 0} 筆。`
        : `已刪除 ${result.deleted_count || 0} 筆，失敗 ${errors.length} 筆：${errors.map((error) => error.message).join("；")}`;
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `批次刪除失敗：${error.message}`;
    }).deleteInvoiceDraftsBatch(inputs);
  }
  function confirmSelectedInvoiceDrafts(saveToRules) {
    const inputs = (dashboardData.pendingInvoiceDrafts || []).map((_, index) => {
      const checkbox = document.getElementById(`invoiceSelect${index}`);
      return checkbox && checkbox.checked ? buildInvoiceConfirmationInput(index, saveToRules === true) : null;
    }).filter(Boolean);
    if (inputs.length === 0) {
      document.getElementById("invoiceImportResult").textContent = "請先勾選要確認入帳的發票。";
      return;
    }
    document.getElementById("invoiceImportResult").textContent = `正在批次確認 ${inputs.length} 筆發票...`;
    google.script.run.withSuccessHandler((result) => {
      const errors = result.errors || [];
      document.getElementById("invoiceImportResult").textContent = errors.length === 0
        ? `已批次確認 ${result.confirmed_count || 0} 筆。`
        : `已確認 ${result.confirmed_count || 0} 筆，失敗 ${errors.length} 筆：${errors.map((error) => error.message).join("；")}`;
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `批次確認失敗：${error.message}`;
    }).confirmInvoiceDraftsBatch(inputs);
  }
  function confirmInvoiceDraft(index, saveToRules) {
    const row = (dashboardData.pendingInvoiceDrafts || [])[index];
    if (!row) return;
    const paymentToolType = document.getElementById(`invoicePayment${index}`).value;
    const input = {
      import_id: row.import_id,
      budget_item: document.getElementById(`invoiceBudget${index}`).value,
      payment_tool_type: paymentToolType,
      credit_card_name: paymentToolType === "credit_card" ? document.getElementById(`invoiceCard${index}`).value : "",
      save_to_merchant_payment_rules: saveToRules === true,
    };
    document.getElementById("invoiceImportResult").textContent = "正在確認入帳...";
    google.script.run.withSuccessHandler(() => {
      document.getElementById("invoiceImportResult").textContent = "已確認入帳。";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `確認失敗：${error.message}`;
    }).confirmInvoiceDraft(input);
  }
  function deleteInvoiceDraft(index) {
    const input = buildInvoiceDeletionInput(index);
    if (!input) return;
    document.getElementById("invoiceImportResult").textContent = "正在刪除待確認發票...";
    google.script.run.withSuccessHandler(() => {
      document.getElementById("invoiceImportResult").textContent = "已刪除待確認發票。";
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("invoiceImportResult").textContent = `刪除失敗：${error.message}`;
    }).deleteInvoiceDraft(input);
  }
  function renderBudgetOptions(items) {
    const selects = [
      document.getElementById("budgetItemSelect"),
      document.getElementById("budgetLookupItemSelect"),
    ].filter(Boolean);
    if (items.length === 0) {
      selects.forEach((select) => select.innerHTML = '<option value="">尚未載入預算項目</option>');
      return;
    }
    const html = items.map((item) => `<option value="${escapeHtml(item.budget_item)}">${escapeHtml(item.budget_item)}</option>`).join("");
    selects.forEach((select) => select.innerHTML = html);
  }

  function toggleCard() {
    const isCard = document.getElementById("paymentToolType").value === "credit_card";
    document.getElementById("cardField").style.display = isCard ? "grid" : "none";
  }

  function submitExpense(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const input = Object.fromEntries(formData.entries());
    input.save_to_merchant_payment_rules = event.submitter && event.submitter.value === "yes" ? "yes" : "no";
    document.getElementById("expenseResult").textContent = "正在儲存消費...";
    google.script.run.withSuccessHandler((result) => {
      const impact = result.budget_impact || {};
      document.getElementById("expenseResult").textContent = `已儲存。這筆消費後，${impact.budget_item || "此項目"} 剩餘 ${formatMoney(impact.after_remaining)}，狀態：${translateStatus(impact.after_status)}。`;
      event.target.reset();
      previewExpenseBudget();
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("expenseResult").textContent = `儲存失敗：${error.message}`;
    }).createManualExpense(input);
  }

  function submitIncome(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const input = Object.fromEntries(formData.entries());
    document.getElementById("incomeResult").textContent = "正在儲存收入...";
    google.script.run.withSuccessHandler((result) => {
      document.getElementById("incomeResult").textContent = `已儲存收入：${escapeHtml(result.income_item)}，金額 ${formatMoney(result.income_amount)}。`;
      event.target.reset();
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("incomeResult").textContent = `儲存失敗：${error.message}`;
    }).createIncome(input);
  }

  function submitSalarySchedule(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const input = Object.fromEntries(formData.entries());
    document.getElementById("salaryScheduleResult").textContent = "正在建立薪資排程...";
    google.script.run.withSuccessHandler((result) => {
      document.getElementById("salaryScheduleResult").textContent = `已建立 ${result.created_count || 0} 筆薪資收入排程。`;
      event.target.reset();
      refresh();
    }).withFailureHandler((error) => {
      document.getElementById("salaryScheduleResult").textContent = `建立失敗：${error.message}`;
    }).createMonthlySalarySchedule(input);
  }

  function queryBudget(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const input = Object.fromEntries(formData.entries());
    document.getElementById("budgetLookupResult").innerHTML = "<pre>正在查詢預算...</pre>";
    google.script.run.withSuccessHandler((row) => {
      document.getElementById("budgetLookupResult").innerHTML = renderBudgetLookupTable(row);
    }).withFailureHandler((error) => {
      document.getElementById("budgetLookupResult").innerHTML = `<pre>查詢失敗：${escapeHtml(error.message)}</pre>`;
    }).getBudgetLookup(input);
  }

  function previewExpenseBudget() {
    const budgetItem = document.getElementById("budgetItemSelect").value;
    const date = document.getElementById("expenseConsumptionDate").value;
    const amount = document.getElementById("expenseAmount").value;
    const target = document.getElementById("expenseBudgetPreview");
    if (!target) return;
    if (!budgetItem || !date || !amount) {
      target.innerHTML = '<pre>選擇消費日、預算項目並輸入金額後，這裡會顯示花下去前後的年度與月度預算影響。</pre>';
      return;
    }
    google.script.run.withSuccessHandler((row) => {
      target.innerHTML = renderBudgetLookupTable(row);
    }).withFailureHandler((error) => {
      target.innerHTML = `<pre>預算預覽失敗：${escapeHtml(error.message)}</pre>`;
    }).getBudgetLookup({
      budget_item: budgetItem,
      budget_month: formatMonth(date),
      preview_amount: amount,
    });
  }

  function renderBudgetLookupTable(row) {
    return [
      "<table><thead><tr><th>預算項目</th><th>年度預算</th><th>年度已用</th><th>年度剩餘</th><th>年度動支比例</th><th>年度狀態</th><th>月預算</th><th>月已用</th><th>月剩餘</th><th>月度動支比例</th><th>月度狀態</th><th>花下去後年度剩餘</th><th>花下去後月剩餘</th><th>花下去後月度狀態</th></tr></thead><tbody>",
      `<tr class="${row.after_monthly_status || row.after_annual_status || ""}"><td>${escapeHtml(row.budget_item)}</td><td>${formatMoney(row.annual_budget)}</td><td>${formatMoney(row.annual_used)}</td><td>${formatMoney(row.annual_remaining)}</td><td>${formatPercent(row.annual_usage_ratio)}</td><td>${translateStatus(row.annual_status)}</td><td>${formatMoney(row.monthly_budget)}</td><td>${formatMoney(row.monthly_used)}</td><td>${formatMoney(row.monthly_remaining)}</td><td>${formatPercent(row.monthly_usage_ratio)}</td><td>${translateStatus(row.monthly_status)}</td><td>${formatMoney(row.after_annual_remaining)}</td><td>${formatMoney(row.after_monthly_remaining)}</td><td>${translateStatus(row.after_monthly_status)}</td></tr>`,
      "</tbody></table>",
    ].join("");
  }

  function formatMonth(value) {
    if (typeof value === "string" && /^\d{4}-\d{2}/.test(value)) return value.slice(0, 7);
    return value || "";
  }

  function formatDate(value) {
    if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}T/.test(value)) return formatTaipeiDate(value);
    if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}/.test(value)) return value.slice(0, 10);
    if (value instanceof Date) return formatTaipeiDate(value);
    return value || "";
  }

  function formatTaipeiDate(value) {
    const date = value instanceof Date ? value : new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Taipei",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
    }).formatToParts(date);
    const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
    return `${values.year}-${values.month}-${values.day}`;
  }

  function formatMoney(value) {
    return Number(value || 0).toLocaleString("zh-TW", { maximumFractionDigits: 0 });
  }

  function formatPercent(value) {
    return `${Math.round(Number(value || 0) * 1000) / 10}%`;
  }

  function formatStatusCounts(counts) {
    const statusCounts = counts || {};
    return ["estimated", "reconciled", "paid", "corrected", "offset"]
      .filter((status) => Number(statusCounts[status] || 0) > 0)
      .map((status) => `${translateStatus(status)} ${Number(statusCounts[status] || 0)}`)
      .join("、") || "無";
  }

  function statusBadge(status) {
    const safeClass = String(status || "").replace(/[^a-zA-Z0-9_-]/g, "");
    return `<span class="status-pill ${safeClass}">${escapeHtml(translateStatus(status))}</span>`;
  }

  function incomeStatusBadge(status) {
    const safeClass = String(status || "").replace(/[^a-zA-Z0-9_-]/g, "");
    return `<span class="status-pill ${safeClass}">${escapeHtml(translateIncomeStatus(status))}</span>`;
  }

  function translateStatus(status) {
    const labels = {
      normal: "正常",
      reminder: "提醒",
      warning: "警示",
      over_budget: "已超支",
      estimated: "預估",
      reconciled: "已對帳",
      paid: "已付款",
      corrected: "已修正",
      offset: "已沖銷",
      cancelled: "已取消",
    };
    return labels[status] || status || "";
  }

  function translateIncomeStatus(status) {
    const labels = {
      estimated: "預估",
      received: "已入帳",
      corrected: "已修正",
    };
    return labels[status] || status || "";
  }

  function translateCreditCard(value) {
    const labels = { YuShan: "玉山", Union: "聯邦", Cathay: "國泰", Fubon: "富邦", CTBC: "中信" };
    return labels[value] || value || "";
  }

  function translatePaymentLabel(value) {
    if (!value) return "";
    if (value === "現金") return value;
    return value
      .replace("YuShan", "玉山")
      .replace("Union", "聯邦")
      .replace("Cathay", "國泰")
      .replace("Fubon", "富邦")
      .replace("CTBC", "中信");
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function setDebug(message) {
    const debug = document.getElementById("dashboardDebug");
    if (debug) debug.textContent = message;
  }

  refresh();
</script>
